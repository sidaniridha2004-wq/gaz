; =============================================================================
;  Intelligent Home Gas & CO Detection Safety System
;  PlatformIO project configuration
; -----------------------------------------------------------------------------
;  Build environments share a common protocol header (lib/common):
;    * env:hub               -> the central control unit
;    * env:node_<room>       -> one per room (each carries its ROOM_ID/NAME)
;
;  Add a new room by copying a node_* block and changing ROOM_ID / ROOM_NAME.
;
;  Examples:
;    pio run                              # build default envs
;    pio run -e hub -t upload             # flash the hub
;    pio run -e node_kitchen -t upload    # flash the kitchen node
;    pio device monitor -b 115200         # serial monitor
; =============================================================================

[platformio]
default_envs = node_living_room, hub

; ---- Settings shared by every environment ----------------------------------
[env]
platform = espressif32@^6.6.0
framework = arduino
board = esp32dev
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
build_flags =
    -Wall
    -Wextra
    -std=gnu++17
    -Ilib/common
build_unflags = -std=gnu++11

; ---- Shared sensor-node settings (inherited by each node_* env) -------------
[node]
build_src_filter = +<sensor_node/> -<hub/>

; ---- One environment per room ----------------------------------------------
[env:node_living_room]
extends = node
build_flags = ${env.build_flags} -DROOM_ID=1 -DROOM_NAME='"Living Room"'

[env:node_kitchen]
extends = node
build_flags = ${env.build_flags} -DROOM_ID=2 -DROOM_NAME='"Kitchen"'

[env:node_bedroom]
extends = node
build_flags = ${env.build_flags} -DROOM_ID=3 -DROOM_NAME='"Bedroom"'

; ---- Central control unit (gas-source shutoff) -----------------------------
[env:hub]
build_src_filter = +<hub/> -<sensor_node/>
build_flags =
    ${env.build_flags}
    ; Set the homeowner's number here (E.164), e.g. -DHOMEOWNER_PHONE='"+15551234567"'
    ; Add -DGSM_ENABLE=0 to build/test without a SIM800L attached.
lib_deps =
    madhephaestus/ESP32Servo @ ^1.2.0
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
